name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # App — lint + typecheck (build/staging คุมโดย Vercel Preview, ไม่ build ซ้ำใน CI)
  # ─────────────────────────────────────────────────────────────────────────────
  app:
    name: App (lint · types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm type:check

  # ─────────────────────────────────────────────────────────────────────────────
  # Cloud Run workers — typecheck + build (tsc) ทั้ง 3 ตัว
  # ─────────────────────────────────────────────────────────────────────────────
  workers:
    name: Workers (types · build)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [pdf-renderer, ocr-worker, stt-worker, pdf-compress-worker]
    # workers ใช้ npm (มี package-lock.json ของตัวเอง — ไม่อยู่ใน pnpm workspace)
    # ⚠️ ห้ามใช้ `pnpm --filter <service>` — services ไม่อยู่ใน workspace → pnpm exit 0 เงียบ ๆ (ผ่านปลอม ไม่ได้ build จริง)
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run build
