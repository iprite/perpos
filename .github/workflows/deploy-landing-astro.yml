name: Deploy landing-astro (Cloudflare)

# Auto-deploy the Astro landing Worker to Cloudflare on every push to main that
# touches the app (or this workflow). Build runs from the repo root (pnpm
# workspace) then `wrangler deploy` ships the Worker from apps/landing-astro.
#
# Required GitHub repo secrets:
#   CLOUDFLARE_API_TOKEN   — token with "Edit Cloudflare Workers" permission
#   CLOUDFLARE_ACCOUNT_ID  — the Cloudflare account id that owns the Worker
on:
  push:
    branches: [main]
    paths:
      - "apps/landing-astro/**"
      - ".github/workflows/deploy-landing-astro.yml"
  workflow_dispatch: {} # allow manual "Run workflow" too

concurrency:
  group: deploy-landing-astro
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9.1.4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm --filter landing-astro build
        env:
          PUBLIC_SITE_URL: https://www.perpos.ai
          PUBLIC_APP_URL: https://app.perpos.ai
      - name: Deploy (wrangler)
        run: pnpm --filter landing-astro exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
