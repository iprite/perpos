name: Uptime check

# เช็คจาก "ข้างนอก" (GitHub) — ถ้าแอปล่ม endpoint แจ้งเตือนในแอปก็ล่มด้วย
# จึงต้องยิง LINE ตรงจากที่นี่ ไม่ผ่าน /api/admin/alerts/uptime
on:
  schedule:
    - cron: "*/5 * * * *" # ทุก ~5 นาที (GitHub cron อาจ delay ช่วง peak — เป็นเรื่องปกติ)
  workflow_dispatch: {} # กดทดสอบเองได้

concurrency:
  group: uptime
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check /api/health (retry 3 ครั้ง กัน blip ชั่วคราว)
        id: check
        run: |
          URL="https://app.perpos.ai/api/health"
          code="000"
          ok=""
          for i in 1 2 3; do
            code=$(curl -s -m 10 -o body.txt -w "%{http_code}" "$URL" || echo "000")
            body=$(cat body.txt 2>/dev/null || echo "")
            echo "attempt $i: HTTP $code | body=$body"
            if [ "$code" = "200" ] && printf '%s' "$body" | grep -q '"ok":true'; then
              ok=1; break
            fi
            [ "$i" -lt 3 ] && sleep 10
          done
          if [ -n "$ok" ]; then
            echo "✅ healthy"
            echo "down=" >> "$GITHUB_OUTPUT"
          else
            echo "🔴 down (last HTTP $code)"
            echo "down=1" >> "$GITHUB_OUTPUT"
            echo "last_code=$code" >> "$GITHUB_OUTPUT"
          fi

      - name: Alert LINE ถ้าล่ม (ยิงตรงไป LINE — survive ตอนแอปดับ)
        if: steps.check.outputs.down == '1'
        env:
          LINE_TOKEN: ${{ secrets.LINE_MESSAGING_CHANNEL_ACCESS_TOKEN }}
          LINE_IDS: ${{ secrets.ALERT_LINE_USER_IDS }}
        run: |
          if [ -z "$LINE_TOKEN" ] || [ -z "$LINE_IDS" ]; then
            echo "::warning::ขาด secret LINE_MESSAGING_CHANNEL_ACCESS_TOKEN หรือ ALERT_LINE_USER_IDS — ข้ามการแจ้งเตือน"
            exit 0
          fi
          MSG="🔴 PERPOS เว็บอาจล่ม — /api/health ตอบ HTTP ${{ steps.check.outputs.last_code }}
          เช็คจาก GitHub Actions: $(date -u '+%Y-%m-%d %H:%M UTC')"
          IFS=','
          for id in $LINE_IDS; do
            id=$(echo "$id" | xargs)
            [ -z "$id" ] && continue
            payload=$(jq -n --arg to "$id" --arg text "$MSG" '{to:$to, messages:[{type:"text", text:$text}]}')
            curl -s -X POST https://api.line.me/v2/bot/message/push \
              -H "Authorization: Bearer $LINE_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$payload" -o /dev/null -w "LINE push -> $id: HTTP %{http_code}\n"
          done
