version: 2
updates:
  # npm dependencies (monorepo root — ครอบ workspace ทั้งหมด)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # ไม่เสนอ major bump อัตโนมัติ — major (tailwind/next/rizzui/zod ฯลฯ) เป็น breaking
    # ต้องทำ migration มือเมื่อพร้อม (Vercel build เคยพังจาก tailwind v4 auto-bump)
    # security updates ยัง bump ข้าม ignore ได้เมื่อมีช่องโหว่
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # tailwindcss มี 2 สายในโมโนรีโป (v3 = apps/perpos+packages, v4 = apps/landing-astro)
      # grouped update ของ dependabot เขียนทับ landing-astro กลับเป็น ^3.x (downgrade)
      # → Cloudflare build พัง (เกิดแล้วใน PR #92, #104) — bump tailwindcss มือเท่านั้น
      - dependency-name: "tailwindcss"
    groups:
      # รวม minor/patch เป็น PR เดียว กัน spam
      minor-and-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions ที่ใช้ใน workflow (checkout, setup-node, gcloud ฯลฯ)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
